name: Health Check & Auto-Rescue

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check site health
        id: health
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 https://office-of-accountability.org/ 2>/dev/null || echo "000")
          echo "status=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Site is healthy (HTTP $HTTP_CODE)"
          else
            echo "Site is DOWN (HTTP $HTTP_CODE)"
          fi

      - name: Rescue via SSH
        if: steps.health.outputs.status != '200'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: false
          script: |
            echo "=== Rescue triggered ==="
            date
            free -h
            docker ps | grep -q neo4j || docker start neo4j
            sleep 5
            grep -q 'mode === "production"' /opt/ooa/webapp/node_modules/vinext/dist/index.js || \
              sed -i 's/env?.command === "build"/env?.command === "build" || mode === "production"/' /opt/ooa/webapp/node_modules/vinext/dist/index.js
            systemctl restart ooa
            sleep 5
            curl -sf -o /dev/null http://localhost:5174/ && echo "Rescue successful" || echo "Rescue FAILED"
