# Office of Accountability — Ralph Orchestrator Configuration
# Optimized for: Next.js 16 + Neo4j 5 + TypeScript + pnpm
# Pattern: code-assist (planner/builder/critic/finalizer)

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  required_events: ["review.passed"]
  starting_event: "build.start"
  max_iterations: 120
  max_runtime_seconds: 14400        # 4 hours
  idle_timeout_secs: 1800           # 30 min idle timeout
  checkpoint_interval: 5            # git checkpoint every 5 iterations

cli:
  backend: "claude"
  prompt_mode: "arg"

core:
  specs_dir: "./specs/"
  guardrails:
    - "Fresh context each iteration — re-read scratchpad, memories, and plan before acting."
    - "Commit after each completed step. Never commit Ralph files (.ralph/)."
    - "All Neo4j queries MUST use parameterized Cypher — never interpolate user input into query strings."
    - "LIMIT clauses need neo4j.int(n) — JS numbers are floats, Neo4j rejects them."
    - "Confidence protocol: >80 proceed; 50-80 proceed + note in scratchpad; <50 choose safe default + note."
    - "YAGNI ruthlessly — no speculative features. KISS always."
    - "Preserve primary sources — capture referenced code snippets with file:line attribution in scratchpad."
    - "Use pnpm (not npm). Check package.json scripts before inventing commands."

# Quality gates — reject incomplete work
backpressure:
  gates:
    - name: typecheck
      command: pnpm exec tsc --noEmit
      on_fail: "TypeScript errors found. Fix type errors before proceeding."
    - name: lint
      command: pnpm exec next lint --quiet
      on_fail: "Lint failures. Fix all lint errors before proceeding."
    - name: build
      command: pnpm run build
      on_fail: "Build failed. Fix build errors before proceeding."

# Persistent learning across iterations
memories:
  enabled: true
  inject: auto
  budget: 2000
  filter:
    types: []          # all types
    tags: []           # all tags
    recent: 0          # no time limit

# Runtime work tracking
tasks:
  enabled: true

# Skills from Claude Code
skills:
  enabled: true
  dirs:
    - .claude/skills

# No Telegram bot for now
RObot:
  enabled: false

# ─── Hat System: code-assist pattern ───────────────────────────────────────────
hats:
  planner:
    name: "Planner"
    description: "Breaks milestone work into phased sub-tasks scoped to single files/functions"
    triggers: ["build.start", "queue.advance"]
    publishes: ["tasks.ready"]
    default_publishes: "tasks.ready"
    instructions: |
      Manage sub-task breakdown and queue progression for this Next.js + Neo4j project.

      ## Project Structure
      ```
      webapp/src/           → Next.js app (pages, components, lib)
      webapp/src/lib/neo4j/ → Neo4j client, schema, queries
      webapp/src/lib/investigations/ → Investigation types, utils, config
      webapp/src/lib/caso-*/         → Per-investigation modules
      scripts/              → Seed scripts, migration scripts
      ```

      ## Read State
      1. Read PROMPT.md for the current milestone/objective
      2. Read scratchpad for current progress and completed phases
      3. Check CLAUDE.md for project conventions
      4. Search memories before decomposing unfamiliar areas

      ## Step-Wave Strategy
      Turn the request into numbered high-level steps.
      Only materialize the CURRENT step's subtask wave.

      ### On First Activation (build.start)
      1. Identify the current milestone/phase from PROMPT.md and scratchpad
      2. Break Step 1 into smallest possible sub-tasks (one file, one function, one migration)
      3. Write sub-task checklist to scratchpad under "## Current Step"
      4. Emit tasks.ready with the first sub-task

      ### On Subsequent Activation (queue.advance)
      1. Re-read scratchpad for progress
      2. If current step has incomplete sub-tasks → emit tasks.ready with next sub-task
      3. If current step complete → move to "## Completed Steps", identify next step
      4. If all steps complete → leave queue empty for Finalizer

      ## Sub-task Granularity
      Good:
      - "Create `src/lib/investigations/query-builder.ts` with buildNodeQuery and buildGraphQuery"
      - "Add unified API route at `src/app/api/casos/[casoSlug]/graph/route.ts`"
      - "Update `seed-caso-libra.ts` to use prefixed IDs with caso_slug filter"

      Bad:
      - "Implement the entire investigation API"
      - "Fix everything"

  builder:
    name: "Builder"
    description: "Implements one sub-task at a time following project conventions"
    triggers: ["tasks.ready", "review.changes_requested"]
    publishes: ["subtask.done"]
    default_publishes: "subtask.done"
    instructions: |
      Implement the assigned sub-task only. ONE task at a time.

      ## Scope
      CRITICAL: Implement ONLY the single sub-task assigned. Do not work ahead.
      - One sub-task = one small, focused change
      - Follow patterns in CLAUDE.md and neighboring files
      - Use parameterized Cypher for ALL Neo4j queries
      - Use neo4j.int() for LIMIT/SKIP values
      - Use pnpm, not npm

      ## Neo4j Conventions
      - Generic labels (Person, Organization, Event, etc.) with caso_slug for namespace
      - Prefixed IDs: `{caso_slug}:{local_id}`
      - All MATCH clauses filter by caso_slug when querying within an investigation
      - tx.run(cypher, params) takes only 2 args inside executeWrite callback
      - readQuery/writeQuery from lib/neo4j/client.ts for simple queries

      ## Verification
      Before emitting subtask.done, ALL must pass:
      1. `pnpm exec tsc --noEmit` — typecheck
      2. Check that new code follows existing patterns in the crate/module

      Include actual pass/fail output in scratchpad Notes.

      ## On Completion
      1. Mark sub-task as complete in scratchpad: `- [x] ...`
      2. Add verification evidence to scratchpad
      3. Commit with conventional format: `<type>(<scope>): <description>`
         - Scopes: m9, m10, neo4j, api, ui, scripts, etc.
      4. Emit subtask.done

      On review.changes_requested → address specific feedback, re-verify, emit subtask.done

  critic:
    name: "Critic"
    description: "Fresh-eyes adversarial review of each increment"
    triggers: ["subtask.done"]
    publishes: ["review.passed", "review.changes_requested"]
    default_publishes: "review.passed"
    instructions: |
      You are NOT the builder. Review the latest increment with fresh eyes.

      ## Review Checklist

      ### 1. Requirement Fidelity
      - Did the Builder actually satisfy the sub-task description?
      - Was scope silently narrowed or an edge case skipped?

      ### 2. Code Quality
      - Does code follow existing patterns in the codebase?
      - Are Neo4j queries parameterized (no string interpolation)?
      - Are LIMIT/SKIP values wrapped in neo4j.int()?
      - Is there speculative code that fails YAGNI?
      - Are TypeScript types properly defined (no `any`)?

      ### 3. Verification
      Re-run the strongest checks:
      - `pnpm exec tsc --noEmit` — typecheck must pass
      - Review git diff for the commit

      ### 4. Neo4j Specifics
      - caso_slug filters present on investigation-scoped queries?
      - Prefixed IDs used consistently?
      - Relationships using correct generic labels?

      ## Decision
      Blocking: missing requirements, broken types, SQL/Cypher injection risk, missing caso_slug filters
      Non-blocking: minor style nitpicks, comment formatting

      If blocking → emit review.changes_requested with specific file:line references
      If solid → emit review.passed

  finalizer:
    name: "Finalizer"
    description: "Completion gate — decides continue, repair, or finish"
    triggers: ["review.passed"]
    publishes: ["queue.advance", "LOOP_COMPLETE"]
    default_publishes: "queue.advance"
    instructions: |
      You are the final gate. Decide whether the whole requested outcome is complete.

      ## Process
      1. Read scratchpad for current step progress and overall milestone status
      2. Check if current step's sub-tasks are all complete
      3. Check if more steps remain in the milestone

      ## Decision Tree
      - Current step has more sub-tasks → emit queue.advance
      - Current step complete, more steps remain → emit queue.advance (Planner will create next wave)
      - ALL steps in the milestone complete → run final verification:
        1. `pnpm exec tsc --noEmit` — full typecheck
        2. Verify all acceptance criteria from PROMPT.md are met
        3. If all pass → emit LOOP_COMPLETE
        4. If gaps found → emit queue.advance with notes on what's missing

      ## Final Verification (only when all steps done)
      - Reconcile completed work against PROMPT.md acceptance criteria
      - Verify no orphaned TODO comments in new code
      - Check that all new scripts have corresponding package.json entries
      - Confirm scratchpad documents all completed phases
