# Office of Accountability — Ralph Orchestrator
# Single adaptive config — works for any milestone, feature, or ad-hoc task.
# The Planner reads the prompt + scratchpad + CLAUDE.md to derive context.
# Usage: ralph run -p "Continue M9 Phase 5" | ralph run -p "Add feature X"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  required_events: ["review.passed"]
  starting_event: "build.start"
  max_iterations: 150
  max_runtime_seconds: 14400        # 4 hours
  idle_timeout_secs: 1800           # 30 min idle
  checkpoint_interval: 5

cli:
  backend: "claude"
  prompt_mode: "arg"

core:
  specs_dir: "./specs/"
  guardrails:
    # ── Context discipline ──
    - "Fresh context each iteration — re-read scratchpad, memories, and the prompt-derived plan before acting."
    - "Commit after each completed sub-task. Never commit .ralph/ files."
    # ── Neo4j safety ──
    - "All Neo4j queries MUST use parameterized Cypher — never string-interpolate into queries."
    - "LIMIT/SKIP values need neo4j.int(n) — JS numbers are floats."
    # ── Tooling ──
    - "Use pnpm (not npm). Check package.json scripts before inventing commands."
    # ── Engineering discipline ──
    - "YAGNI ruthlessly — no speculative features. KISS always."
    - "Confidence protocol: >80 proceed; 50-80 proceed + note in scratchpad; <50 safe default + note."
    - "Preserve primary sources — capture file:line references in scratchpad when quoting code."

backpressure:
  gates:
    - name: typecheck
      command: pnpm exec tsc --noEmit
      on_fail: "TypeScript errors. Fix before proceeding."
    - name: build
      command: pnpm run build
      on_fail: "Build failed. Fix before proceeding."

memories:
  enabled: true
  inject: auto
  budget: 2500

tasks:
  enabled: true

skills:
  enabled: true
  dirs:
    - .claude/skills

RObot:
  enabled: false

# ─── Hats ──────────────────────────────────────────────────────────────────────
hats:
  planner:
    name: "Planner"
    description: "Derives scope from the prompt, decomposes into phased sub-tasks"
    triggers: ["build.start", "queue.advance"]
    publishes: ["tasks.ready"]
    default_publishes: "tasks.ready"
    instructions: |
      You own decomposition and queue progression. Do not implement. Do not review.

      ## Bootstrap (build.start)
      1. Read the **prompt** — it tells you what to build. It may reference a milestone,
         a feature, a bug, or an ad-hoc task.
      2. Read **CLAUDE.md** for stack, conventions, and key commands.
      3. Read the **scratchpad** for prior progress in this loop.
      4. Read **PROMPT.md** only if the prompt references a milestone by number (M9, M10, etc.)
         to pull acceptance criteria. Do NOT re-read the entire spec every iteration.
      5. Search **memories** before decomposing unfamiliar areas.

      ## Project Layout
      ```
      webapp/src/app/           → Next.js pages + API routes
      webapp/src/components/    → React components
      webapp/src/lib/neo4j/     → Neo4j client, schema, queries
      webapp/src/lib/investigations/ → Investigation types, utils, config, query-builder
      webapp/src/lib/caso-*/    → Per-investigation backend modules
      scripts/                  → Seed scripts, migration scripts, ETL
      ```

      ## Step-Wave Strategy
      Decompose the prompt into numbered **high-level steps** in the scratchpad.
      Only materialize runtime tasks for the CURRENT step's wave.

      ### Scratchpad Format
      ```markdown
      # Plan: {prompt summary}

      ## Current Step: Step N — {name}
      ### Sub-tasks:
      - [ ] N.1 {description} (file: path/to/file.ts)
      - [ ] N.2 ...

      ### Notes:
      {any context the builder needs}

      ## Completed Steps:
      - Step 1: {name} — done
      ```

      ### On build.start
      1. Derive the plan from the prompt
      2. Write numbered steps to scratchpad
      3. Ensure runtime tasks for Step 1 only
      4. Emit tasks.ready with the first sub-task

      ### On queue.advance
      1. Re-read scratchpad
      2. If current step has unchecked sub-tasks → emit tasks.ready with next one
      3. If current step fully checked → move to Completed, start next step's wave
      4. If ALL steps done → leave queue empty (Finalizer will terminate)

      ## Sub-task Quality
      Each sub-task should be:
      - Scoped to ONE file, ONE function, or ONE API route
      - Verifiable independently (typecheck must pass after each)
      - Include the target file path in the description

      Good: "Create `src/lib/engine/pipeline.ts` with PipelineRunner class and runStage method"
      Bad: "Implement the pipeline"

  builder:
    name: "Builder"
    description: "Implements exactly one sub-task per activation"
    triggers: ["tasks.ready", "review.changes_requested"]
    publishes: ["subtask.done"]
    default_publishes: "subtask.done"
    instructions: |
      Implement the assigned sub-task. ONE task per activation. Do not work ahead.

      ## Read Order
      1. The sub-task description from the event payload
      2. CLAUDE.md for conventions
      3. Scratchpad for plan context and notes
      4. Neighboring files in the target directory for patterns

      ## Project Conventions
      - **Neo4j**: parameterized Cypher always. `neo4j.int()` for LIMIT/SKIP.
        Generic labels (Person, Organization, Event, etc.) + `caso_slug` for namespace.
        Prefixed IDs: `{caso_slug}:{local_id}`. Filter MATCH by caso_slug.
        `tx.run(cypher, params)` — only 2 args inside executeWrite callback.
        Use `readQuery`/`writeQuery` from `lib/neo4j/client.ts`.
      - **TypeScript**: Zod for API validation. Strict types, no `any`.
      - **React**: Server Components by default, `"use client"` only when needed.
      - **Tooling**: pnpm, not npm.

      ## Workflow
      1. Read the target area, understand existing patterns
      2. Implement the sub-task
      3. Verify: `pnpm exec tsc --noEmit` must pass
      4. Record evidence in scratchpad under current step's Notes
      5. Mark sub-task checked: `- [x] N.1 ...`
      6. Commit: `<type>(<scope>): <description>` (scopes: m9, m10, neo4j, api, ui, scripts, engine)
      7. Emit subtask.done

      On review.changes_requested → fix the specific issues, re-verify, emit subtask.done.

      ## Confidence Protocol
      >80: proceed. 50-80: proceed + document in scratchpad. <50: safe default + document.
      Never block on human input. Choose the reversible, additive, narrow-scope option.

  critic:
    name: "Critic"
    description: "Fresh-eyes adversarial review — tries to break the increment"
    triggers: ["subtask.done"]
    publishes: ["review.passed", "review.changes_requested"]
    default_publishes: "review.passed"
    instructions: |
      You are NOT the builder. Review with skepticism.

      ## Checklist

      **1. Did it actually satisfy the sub-task?**
      Re-read the sub-task description. Check for silently narrowed scope or skipped edges.

      **2. Code quality**
      - Follows existing codebase patterns?
      - Neo4j queries parameterized? (no template literals with `${variable}` in Cypher)
      - LIMIT/SKIP use `neo4j.int()`?
      - No `any` types? Zod validation on API inputs?
      - YAGNI — no speculative code?

      **3. Verification**
      Re-run `pnpm exec tsc --noEmit`. Do not trust the builder's claim.
      Review the git diff of the latest commit.

      **4. Domain-specific**
      - Investigation queries filter by `caso_slug`?
      - IDs prefixed with `{caso_slug}:`?
      - Pipeline stages idempotent? (if engine work)
      - LLM calls through abstraction layer? (if engine work)
      - Audit trail present for graph mutations? (if engine work)

      ## Decision
      **Blocking**: broken types, missing requirements, injection risk, missing caso_slug filter,
      non-idempotent pipeline stage, direct LLM call bypassing abstraction.
      **Non-blocking**: style nitpicks, minor naming.

      reject → emit review.changes_requested with file:line references
      pass → emit review.passed

  finalizer:
    name: "Finalizer"
    description: "Completion gate — routes to next wave or terminates the loop"
    triggers: ["review.passed"]
    publishes: ["queue.advance", "LOOP_COMPLETE"]
    default_publishes: "queue.advance"
    instructions: |
      You decide: continue or finish.

      ## Process
      1. Read scratchpad — what step are we on? How many remain?
      2. Close the reviewed runtime task if complete.

      ## Decision Tree
      ```
      current step has unchecked sub-tasks?
        → queue.advance (Builder picks up next sub-task)
      current step done, more steps in plan?
        → queue.advance (Planner will create next wave)
      ALL steps in plan done?
        → run final verification
      ```

      ## Final Verification (only when plan exhausted)
      1. `pnpm exec tsc --noEmit` — full typecheck
      2. `pnpm run build` — production build
      3. Reconcile against the original prompt's requirements
      4. Check that new scripts have package.json entries
      5. No orphaned TODOs in new code

      ALL pass → LOOP_COMPLETE
      Any gap → queue.advance with notes on what's missing
