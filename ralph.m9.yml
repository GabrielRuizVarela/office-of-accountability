# M9 Investigation Standardization — Focused Ralph Config
# Use: ralph run -c ralph.m9.yml -p "Continue M9 Phase 5: query-builder, registry, unified API routes"
#
# Inherits the full hat system from ralph.yml but with M9-specific tuning:
# - Lower iteration cap (M9 remaining work is bounded)
# - Focused guardrails for investigation standardization

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  required_events: ["review.passed"]
  starting_event: "build.start"
  max_iterations: 60               # M9 remaining phases are bounded
  max_runtime_seconds: 7200        # 2 hours for a focused session
  idle_timeout_secs: 1200
  checkpoint_interval: 3           # More frequent checkpoints for data migrations

cli:
  backend: "claude"
  prompt_mode: "arg"

core:
  specs_dir: "./specs/"
  guardrails:
    - "Fresh context each iteration — re-read scratchpad and memories."
    - "Commit after each completed step. Never commit Ralph files."
    - "All Neo4j queries MUST use parameterized Cypher."
    - "LIMIT clauses need neo4j.int(n)."
    - "Every investigation-scoped query MUST filter by caso_slug."
    - "All node IDs in investigation data MUST use prefixed format: {caso_slug}:{local_id}."
    - "Use generic labels (Person, Organization, Event, etc.) — never CasoLibra* prefixed labels."
    - "Use pnpm, not npm."

backpressure:
  gates:
    - name: typecheck
      command: pnpm exec tsc --noEmit
      on_fail: "TypeScript errors. Fix before proceeding."

memories:
  enabled: true
  inject: auto
  budget: 2000

tasks:
  enabled: true

skills:
  enabled: true
  dirs:
    - .claude/skills

RObot:
  enabled: false

hats:
  planner:
    name: "Planner"
    description: "Breaks M9 phases into file-level sub-tasks"
    triggers: ["build.start", "queue.advance"]
    publishes: ["tasks.ready"]
    default_publishes: "tasks.ready"
    instructions: |
      You are planning M9 Investigation Standardization work.

      ## M9 Progress (from scratchpad)
      - Phase 1 DONE: types.ts, utils.ts, seed-investigation-configs.ts, init-schema.ts
      - Phase 2 DONE: migrate-caso-libra-labels.ts, seed-caso-libra.ts updated
      - Phase 3 DONE: seed-caso-finanzas-politicas.ts
      - Phase 4 DONE: seed-caso-epstein.ts aligned
      - Phase 5 IN PROGRESS: config.ts done, remaining: query-builder.ts, per-caso configs, registry.ts, unified API routes, 301 redirects
      - Phase 6 TODO: frontend standardization

      ## Read State
      1. Read scratchpad for current phase progress
      2. Check what files exist in `webapp/src/lib/investigations/` and `webapp/src/lib/caso-*/`
      3. Check existing API routes at `webapp/src/app/api/`

      ## Sub-task Rules
      One file or one API route per sub-task. Include acceptance criteria.
      Good: "Create query-builder.ts with buildNodeQuery(casoSlug, nodeType) and buildGraphQuery(casoSlug)"
      Bad: "Build the entire API layer"

  builder:
    name: "Builder"
    description: "Implements one M9 sub-task at a time"
    triggers: ["tasks.ready", "review.changes_requested"]
    publishes: ["subtask.done"]
    default_publishes: "subtask.done"
    instructions: |
      Implement the assigned M9 sub-task only.

      ## Key Conventions
      - Generic labels: Person, Organization, Event, Document, Token, Wallet, Location, Aircraft, ShellCompany, Claim, MoneyFlow, GovernmentAction
      - caso_slug property on all investigation-scoped nodes
      - Prefixed IDs: `{caso_slug}:{local_id}`
      - InvestigationConfig → SchemaDefinition → NodeTypeDefinition/RelTypeDefinition
      - readQuery/writeQuery from lib/neo4j/client.ts
      - tx.run(cypher, params) — only 2 args inside executeWrite callback
      - Zod for API input validation

      ## Verification
      1. `pnpm exec tsc --noEmit` must pass
      2. New queries must be parameterized
      3. Commit as `feat(m9): <description>`
      4. Mark complete in scratchpad

  critic:
    name: "Critic"
    description: "Reviews M9 increments for correctness"
    triggers: ["subtask.done"]
    publishes: ["review.passed", "review.changes_requested"]
    default_publishes: "review.passed"
    instructions: |
      Review the M9 increment:

      1. Does it satisfy the sub-task?
      2. Are Neo4j queries parameterized with caso_slug filters?
      3. Are IDs prefixed correctly?
      4. Does `pnpm exec tsc --noEmit` pass?
      5. Are types properly defined (no `any`)?

      Blocking: broken types, missing caso_slug filter, Cypher injection risk, wrong labels
      Non-blocking: style nitpicks

  finalizer:
    name: "Finalizer"
    description: "Decides if M9 phase is complete"
    triggers: ["review.passed"]
    publishes: ["queue.advance", "LOOP_COMPLETE"]
    default_publishes: "queue.advance"
    instructions: |
      Check M9 completion:
      1. Read scratchpad for phase progress
      2. If current phase has more sub-tasks → queue.advance
      3. If current phase complete but more phases remain → queue.advance
      4. If ALL M9 phases (1-6) complete:
         - Verify `pnpm exec tsc --noEmit` passes
         - Verify InvestigationConfig schema exists in Neo4j scripts
         - Verify unified API routes exist
         - Verify frontend uses config-driven rendering
         - If all verified → LOOP_COMPLETE
